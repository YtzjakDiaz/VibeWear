<!-- Copiar esto en el navbar, donde está el input de búsqueda: -->
<div style="position:relative;display:flex;align-items:center;">
  <input type="text" id="searchInput" placeholder="Buscar..." 
    onkeyup="handleSearch()" 
    onfocus="showSearchSuggestions()" 
    style="padding:8px 15px;background:rgba(224,162,201,0.1);border:1px solid rgba(224,162,201,0.3);border-radius:6px;color:var(--white);font-family:var(--font-body);font-size:12px;width:150px;transition:border-color 0.3s;"/>
  <div id="searchSuggestions" class="search-suggestions" style="display:none;position:absolute;top:100%;left:0;background:var(--black-soft);border:1px solid rgba(224,162,201,0.2);border-radius:6px;min-width:200px;max-height:300px;overflow-y:auto;z-index:1000;padding:8px 0;"></div>
</div>

<!-- Script helper para búsqueda -->
<script>
  function handleSearch() {
    const query = document.getElementById('searchInput').value;
    if (!query.trim()) {
      document.getElementById('searchSuggestions').style.display = 'none';
      return;
    }

    // Buscar y mostrar sugerencias
    const suggestions = advancedSearch.getSuggestions(query, productsData, 6);
    const recent = advancedSearch.getRecentSearches();
    
    let html = '';
    
    if (suggestions.length > 0) {
      html += '<div style="padding:8px 0;border-bottom:1px solid rgba(224,162,201,0.1);">';
      suggestions.forEach(s => {
        html += `<div style="padding:8px 15px;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='rgba(224,162,201,0.1)'" onmouseout="this.style.background='transparent'" onclick="search('${s}')" style="font-size:12px;color:var(--gray);">🔍 ${s}</div>`;
      });
      html += '</div>';
    }

    if (recent.length > 0) {
      html += '<div style="padding:8px 0;"><p style="padding:8px 15px;font-size:10px;color:var(--gray);margin:0;letter-spacing:1px;text-transform:uppercase;">Recientes</p>';
      recent.slice(0, 3).forEach(r => {
        html += `<div style="padding:8px 15px;cursor:pointer;font-size:12px;color:var(--gray);" onclick="search('${r}')">${r}</div>`;
      });
      html += '</div>';
    }

    document.getElementById('searchSuggestions').innerHTML = html;
    document.getElementById('searchSuggestions').style.display = 'block';
  }

  function search(query) {
    const results = advancedSearch.executeSearch(query, productsData, {}, 'relevancia');
    console.log(`Resultados para "${query}":`, results);
    // Redirigir a catálogo con resultados o mostrar en modal
    window.location.href = `catalogo.html?search=${encodeURIComponent(query)}`;
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('[id*="search"]')) {
      document.getElementById('searchSuggestions').style.display = 'none';
    }
  });
</script>

<!-- Script para filtros avanzados -->
<script>
  function applyFiltersAdvanced() {
    const filters = {
      priceMin: 0,
      priceMax: parseInt(document.getElementById('filterPrice').value) || 200000,
      category: document.getElementById('categorySelect')?.value || 'all',
      inStock: document.getElementById('filterStock')?.checked || false,
      tags: [],
      sortBy: document.getElementById('filterSort')?.value || 'relevancia'
    };

    const results = advancedSearch.applyFilters(
      Object.values(productsData),
      filters
    );

    const sorted = advancedSearch.sortResults(results, filters.sortBy);
    console.log('Resultados filtrados:', sorted);
    
    // Renderizar productos filtrados
    renderFilteredProducts(sorted);
  }

  function renderFilteredProducts(products) {
    const grid = document.getElementById('productsGrid');
    if (!grid) return;

    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-card-img">
          <span class="product-badge">${p.badge ? p.badge : ''}</span>
          ${getStockBadge(p.id, productsData)}
          <img src="${p.image}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=600&q=80'" />
          <div class="product-overlay"><a href="producto.html#${p.id}" class="btn-card">Ver Producto</a></div>
        </div>
        <div class="product-info">
          <p class="product-category">${p.category}</p>
          <h3 class="product-name">${p.name}</h3>
          <div class="product-footer">
            <span class="product-price">$${p.price.toLocaleString('es-CO')}</span>
            <div class="product-wishlist" onclick="toggleWishlist('${p.id}', '${p.name}')">♡</div>
          </div>
        </div>
      </div>
    `).join('');

    showNotification(`✓ ${products.length} producto${products.length !== 1 ? 's' : ''} encontrado${products.length !== 1 ? 's' : ''}`);
  }
</script>

<!-- Agregar este script para manejar login -->
<script>
  // Elemento del formulario
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');

  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        // Simular login (en producción, usar Firebase)
        const mockUser = {
          uid: 'user-' + Date.now(),
          email: email,
          displayName: email.split('@')[0],
          photoURL: `https://api.dicebear.com/7.x/avataaars/svg?seed=${email}`
        };

        // Guardar en auth system
        authSystem.saveUser(mockUser);

        showNotification('✓ Sesión iniciada');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      } catch (error) {
        showNotification('✗ Error en login: ' + error.message);
      }
    });
  }

  if (registerForm) {
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;

      if (password !== confirm) {
        showNotification('✗ Las contraseñas no coinciden');
        return;
      }

      try {
        // Simular registro
        const mockUser = {
          uid: 'user-' + Date.now(),
          email: email,
          displayName: name,
          photoURL: `https://api.dicebear.com/7.x/avataaars/svg?seed=${email}`,
          createdAt: new Date().toISOString()
        };

        // Guardar en auth system
        authSystem.saveUser(mockUser);

        showNotification('✓ Cuenta creada exitosamente');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      } catch (error) {
        showNotification('✗ Error en registro: ' + error.message);
      }
    });
  }
</script>

<!-- ================ FUNCIONES HELPER GLOBALES ================ -->
<!-- Agregar en shared.js o en el HTML que ejecute primero -->

<script>
  /**
   * Mostrar notificación toast
   */
  function showNotification(message) {
    if (!document.getElementById('notificationContainer')) {
      const container = document.createElement('div');
      container.id = 'notificationContainer';
      container.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        max-width: 400px;
      `;
      document.body.appendChild(container);
    }

    const toast = document.createElement('div');
    toast.style.cssText = `
      background: rgba(0,0,0,0.9);
      color: var(--white);
      padding: 15px 20px;
      border-radius: 6px;
      border-left: 3px solid var(--pink);
      margin-bottom: 10px;
      animation: slideIn 0.3s ease;
      font-family: var(--font-body);
      font-size: 13px;
    `;
    toast.textContent = message;

    const container = document.getElementById('notificationContainer');
    container.appendChild(toast);

    setTimeout(() => {
      toast.style.animation = 'slideOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  /**
   * Toggle Wishlist
   */
  function toggleWishlist(prodId, prodName) {
    if (isInWishlist(prodId)) {
      removeFromWishlist(prodId);
      showNotification(`✓ Removido de favoritos`);
    } else {
      addToWishlist(prodId, prodName);
    }
  }

  /**
   * Toggle Cart
   */
  function toggleCart() {
    const cart = document.getElementById('cartPanel');
    if (cart) {
      cart.style.display = cart.style.display === 'none' ? 'block' : 'none';
    }
  }

  /**
   * Cambiar navegación
   */
  function toggleNav() {
    const navLinks = document.getElementById('navLinks');
    if (navLinks) {
      navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
    }
  }
</script>
